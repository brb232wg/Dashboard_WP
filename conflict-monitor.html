<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Global Monitor</title>
<link rel="icon" href="./assets/favicon.ico" sizes="any">
<link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;700&family=Teko:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
<style>
:root{
  --bg:#090909;
  --panel:#111111;
  --text:#f1eee8;
  --muted:#8f897d;
  --accent:#d1a24a;
  --border: rgba(209, 162, 74, .35);
  --terminal: 'Roboto Mono', monospace;
  --headline: 'Teko', sans-serif;
}
*{box-sizing:border-box}
html,body{height:100%}
body{margin:0;background:var(--bg);color:var(--text);font-family:var(--terminal)}
.monitor-page{min-height:100vh;display:grid;grid-template-rows:auto 1fr auto;gap:12px;padding:12px}
.topbar,.panel,.map-panel{border:1px solid var(--border);background:rgba(17,17,17,.96)}
.topbar{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:10px 12px}
h1,h2{margin:0;color:var(--accent);font-family:var(--headline);text-transform:uppercase;letter-spacing:.08em}
.filter-group{display:flex;flex-wrap:wrap;gap:8px}
.filter{border:1px solid var(--border);background:transparent;color:var(--text);padding:6px 10px;cursor:pointer;text-transform:uppercase;font-size:12px}
.filter.active{background:rgba(209,162,74,.22)}
.monitor-grid{display:grid;grid-template-columns:280px 1fr 320px;gap:12px;min-height:72vh}
.panel{padding:12px}
.left-panel{display:grid;gap:14px;align-content:start}
.meter-track{height:10px;background:rgba(255,255,255,.08);border:1px solid var(--border)}
.meter-fill{height:100%;background:linear-gradient(90deg,#ff9f43,#ff4d4d)}
.stat-number{font-size:28px;margin:0}
.map-panel{overflow:hidden;position:relative}
#conflict-map{width:100%;height:100%;min-height:560px}
.feed-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.sort-btn{border:1px solid var(--border);background:transparent;color:var(--text);padding:4px 8px;cursor:pointer}
.feed-list{display:grid;gap:10px;max-height:calc(100vh - 300px);overflow:auto}
.feed-item{border:1px solid rgba(209,162,74,.2);padding:8px;display:grid;gap:3px;background:rgba(9,9,9,.8)}
.event-marker-row{display:flex;gap:8px;align-items:center}
.event-dot{width:10px;height:10px;border-radius:999px;border:1px solid rgba(241,238,232,.7)}
.event-marker-text{display:grid;gap:2px}
.market-panel{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px;align-items:center}
.market-panel div{display:grid;gap:4px}
.market-panel span{color:var(--muted);font-size:12px;text-transform:uppercase}
.maplibregl-popup-content{background:#111;border:1px solid var(--border);color:var(--text);font-family:var(--terminal)}
.maplibregl-ctrl-group{background:#111;border:1px solid var(--border)}
.maplibregl-ctrl button{background:#111;color:var(--text)}
.back-link{color:var(--text);text-decoration:none;border:1px solid var(--border);padding:4px 8px;font-size:12px;text-transform:uppercase}
@media (max-width:1200px){.monitor-grid{grid-template-columns:1fr}.market-panel{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="monitor-page">
  <header class="topbar">
    <div style="display:flex;align-items:center;gap:10px;">
      <a class="back-link" href="index.html">Dashboard</a>
      <h1>Global Monitor</h1>
    </div>
    <div class="filter-group" id="filterGroup"></div>
  </header>

  <main class="monitor-grid">
    <aside class="panel left-panel">
      <section>
        <h2>Escalation Meter</h2>
        <div class="meter-track"><div class="meter-fill" id="meterFill"></div></div>
        <p id="meterValue">0%</p>
      </section>
      <section>
        <h2>Strike Counter</h2>
        <p class="stat-number" id="strikeCounter">0</p>
      </section>
      <section>
        <h2>Casualties Summary</h2>
        <p id="estimatedAffected">Estimated affected: 0</p>
        <p id="criticalIncidents">Critical incidents: 0</p>
      </section>
    </aside>

    <section class="map-panel"><div id="conflict-map"></div></section>

    <aside class="panel right-panel">
      <div class="feed-head">
        <h2>Live Event Feed</h2>
        <button class="sort-btn" id="sortBtn">Newest first</button>
      </div>
      <div class="feed-list" id="feedList"></div>
    </aside>
  </main>

  <footer class="market-panel panel">
    <div><span>Brent</span><strong>$86.42</strong></div>
    <div><span>WTI</span><strong>$82.11</strong></div>
    <div><span>Polymarket: Oil above $100</span><strong>31%</strong></div>
  </footer>
</div>

<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<script>
const FILTERS = [
  { key: 'all', label: 'All', match: () => true },
  { key: 'strikes', label: 'Strikes', match: e => ['confirmed_strike','suspected_strike'].includes(e.type) },
  { key: 'missile_launches', label: 'Missile launches', match: e => e.type === 'strategic_event' },
  { key: 'interceptions', label: 'Interceptions', match: e => e.type === 'interception' },
  { key: 'infrastructure', label: 'Infrastructure', match: e => (e.tags||[]).includes('infrastructure') || e.type === 'strategic_event' },
];
const EVENT_COLORS = {
  confirmed_strike: '#ff4d4d',
  suspected_strike: '#ff9f43',
  strategic_event: '#ffe66d',
  interception: '#4da3ff',
};
const EVENT_LABELS = {
  confirmed_strike: 'Confirmed strike',
  suspected_strike: 'Suspected strike',
  strategic_event: 'Strategic event',
  interception: 'Interception',
};
const FALLBACK_EVENTS = [
  { id: 'ev1', title: 'Interception over Tehran', timestamp: new Date().toISOString(), latitude: 35.6892, longitude: 51.389, severity: 2, type: 'interception', source: 'Regional Wire' },
  { id: 'ev2', title: 'Confirmed strike near Isfahan', timestamp: new Date(Date.now()-3600e3).toISOString(), latitude: 32.6546, longitude: 51.668, severity: 4, type: 'confirmed_strike', source: 'Satellite Analysis' },
  { id: 'ev3', title: 'Suspected launch in western corridor', timestamp: new Date(Date.now()-7200e3).toISOString(), latitude: 34.3142, longitude: 47.065, severity: 3, type: 'suspected_strike', source: 'Open Source' },
];

let events = [];
let activeFilter = 'all';
let sortNewest = true;
let map;

function getEventColor(type){ return EVENT_COLORS[type] || '#d1a24a'; }
function getEventLabel(type){ return EVENT_LABELS[type] || 'Event'; }

function filteredEvents(){
  const filter = FILTERS.find(f => f.key === activeFilter) || FILTERS[0];
  const list = events.filter(filter.match);
  return sortNewest ? list.sort((a,b)=> new Date(b.timestamp)-new Date(a.timestamp)) : list;
}

function toGeoJSON(list){
  return {
    type:'FeatureCollection',
    features:list
      .filter(e => Number.isFinite(e.longitude) && Number.isFinite(e.latitude))
      .map(e => ({
        type:'Feature',
        geometry:{ type:'Point', coordinates:[e.longitude,e.latitude] },
        properties:{ id:e.id, title:e.title, timestamp:e.timestamp, type:e.type, source:e.source || 'Unknown' }
      }))
  };
}

function renderFilters(){
  const box = document.getElementById('filterGroup');
  box.innerHTML = '';
  FILTERS.forEach(filter => {
    const btn = document.createElement('button');
    btn.className = `filter ${activeFilter === filter.key ? 'active' : ''}`;
    btn.textContent = filter.label;
    btn.onclick = () => { activeFilter = filter.key; renderAll(); };
    box.appendChild(btn);
  });
}

function renderFeed(list){
  const feed = document.getElementById('feedList');
  feed.innerHTML = '';
  list.forEach(event => {
    const card = document.createElement('article');
    card.className = 'feed-item';
    card.innerHTML = `
      <div class="event-marker-row">
        <span class="event-dot" style="background:${getEventColor(event.type)}"></span>
        <div class="event-marker-text"><strong>${event.title}</strong><small>${getEventLabel(event.type)}</small></div>
      </div>
      <small>${new Date(event.timestamp).toLocaleString()}</small>
      <small style="color:${getEventColor(event.type)}">${getEventLabel(event.type)}</small>
      <small>Source: ${event.source || 'Unknown'}</small>
    `;
    feed.appendChild(card);
  });
}

function renderStats(list){
  const strikeCounter = list.filter(e => ['confirmed_strike','suspected_strike'].includes(e.type)).length;
  const escalation = Math.min(100, Math.round((list.reduce((n,e)=>n+Number(e.severity||1),0) / Math.max(list.length,1))*20));
  const casualties = list.reduce((acc,e)=>{ const impact = Number(e.severity||0); acc.estimated += impact*3; acc.critical += impact >= 4 ? 1 : 0; return acc; }, {estimated:0, critical:0});

  document.getElementById('strikeCounter').textContent = strikeCounter;
  document.getElementById('meterValue').textContent = `${escalation}%`;
  document.getElementById('meterFill').style.width = `${escalation}%`;
  document.getElementById('estimatedAffected').textContent = `Estimated affected: ${casualties.estimated}`;
  document.getElementById('criticalIncidents').textContent = `Critical incidents: ${casualties.critical}`;
}

function updateMap(list){
  const source = map.getSource('events');
  if (source) source.setData(toGeoJSON(list));
}

function initMap(){
  map = new maplibregl.Map({
    container: 'conflict-map',
    style: 'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json',
    center: [53.688, 32.4279],
    zoom: 4,
    minZoom: 3,
    maxZoom: 12,
    attributionControl: false,
  });
  map.addControl(new maplibregl.NavigationControl(), 'bottom-right');

  map.on('load', () => {
    map.addSource('events', { type:'geojson', data: toGeoJSON(filteredEvents()), cluster:true, clusterRadius:50, clusterMaxZoom:8 });

    map.addLayer({ id:'clusters', type:'circle', source:'events', filter:['has','point_count'], paint:{ 'circle-color':'#d1a24a','circle-radius':['step',['get','point_count'],16,10,20,30,26],'circle-stroke-width':1,'circle-stroke-color':'#f1eee8','circle-opacity':0.85 } });
    map.addLayer({ id:'cluster-count', type:'symbol', source:'events', filter:['has','point_count'], layout:{ 'text-field':['get','point_count_abbreviated'],'text-font':['Open Sans Bold'],'text-size':12 }, paint:{'text-color':'#090909'} });
    map.addLayer({
      id:'points', type:'circle', source:'events', filter:['!',['has','point_count']],
      paint:{
        'circle-color':['match',['get','type'],'confirmed_strike','#ff4d4d','suspected_strike','#ff9f43','strategic_event','#ffe66d','interception','#4da3ff','#d1a24a'],
        'circle-radius':7,'circle-stroke-width':1,'circle-stroke-color':'#f1eee8'
      }
    });

    map.on('click','clusters',(e)=>{
      const features = map.queryRenderedFeatures(e.point,{ layers:['clusters'] });
      const clusterId = features[0].properties.cluster_id;
      map.getSource('events').getClusterExpansionZoom(clusterId,(err,zoom)=>{
        if (err) return;
        map.easeTo({ center: features[0].geometry.coordinates, zoom, duration:450 });
      });
    });

    map.on('click','points',(e)=>{
      const feature = e.features && e.features[0];
      if (!feature) return;
      const p = feature.properties;
      new maplibregl.Popup({ offset:12 })
        .setLngLat(feature.geometry.coordinates)
        .setHTML(`<strong>${p.title}</strong><br><small>${new Date(p.timestamp).toLocaleString()}</small><br><small>${getEventLabel(p.type)}</small><br><small>Source: ${p.source || 'Unknown'}</small>`)
        .addTo(map);
    });

    ['clusters','points'].forEach(layer => {
      map.on('mouseenter', layer, () => map.getCanvas().style.cursor = 'pointer');
      map.on('mouseleave', layer, () => map.getCanvas().style.cursor = '');
    });
  });
}

async function loadEvents(){
  try{
    const r = await fetch('/api/events');
    if(!r.ok) throw new Error('failed');
    const data = await r.json();
    events = Array.isArray(data) ? data : FALLBACK_EVENTS;
  }catch(_){
    events = FALLBACK_EVENTS;
  }
}

function renderAll(){
  const list = filteredEvents();
  renderFilters();
  renderFeed(list);
  renderStats(list);
  if (map && map.getSource('events')) updateMap(list);
}

document.getElementById('sortBtn').onclick = () => {
  sortNewest = !sortNewest;
  document.getElementById('sortBtn').textContent = sortNewest ? 'Newest first' : 'Custom order';
  renderAll();
};

(async function start(){
  initMap();
  await loadEvents();
  renderAll();
  setInterval(async ()=>{ await loadEvents(); renderAll(); }, 30000);
})();
</script>
</body>
</html>
