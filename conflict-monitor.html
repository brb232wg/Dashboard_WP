<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Macro War Room • Global Monitor</title>
<link rel="icon" href="./assets/favicon.ico" sizes="any">
<link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;700&family=Teko:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
<style>
:root{--bg:#090909;--panel:#111111;--text:#f1eee8;--muted:#8f897d;--good:#6d8a70;--bad:#8d6660;--accent:#d1a24a;--radius:0px;--border:rgba(209,162,74,.35);--border2:rgba(209,162,74,.5);--shadow:0 18px 55px rgba(0,0,0,.55);--terminal:'Roboto Mono', monospace;--headline:'Teko', sans-serif}
*{box-sizing:border-box} html,body{height:100%}
body{margin:0;background:var(--bg);color:var(--text);font-family:var(--terminal);letter-spacing:.015em;overflow-x:hidden}
body::after{content:"";position:fixed;inset:0;z-index:-2;background:radial-gradient(1200px 820px at 10% 10%, rgba(209,162,74,.08), transparent 65%),linear-gradient(180deg, rgba(9,9,9,.96), rgba(6,6,6,.98));}
.sidePanel{position:fixed;top:50%;left:0;transform:translateY(-50%);width:230px;background:rgba(12,12,12,.94);border-right:1px solid var(--border);padding:18px 12px;display:flex;flex-direction:column;gap:12px;z-index:10;backdrop-filter:blur(4px);box-shadow:12px 0 40px rgba(0,0,0,.35)}
.panelTitle{font-family:var(--headline);font-size:16px;color:var(--muted);text-transform:uppercase;letter-spacing:.12em;margin-bottom:4px}
.navBtn{display:block;text-decoration:none;background:rgba(18,18,18,.86);border:1px solid rgba(209,162,74,.34);padding:10px;border-radius:0;color:var(--text);transition:.18s ease;font-family:var(--terminal);text-transform:uppercase;letter-spacing:.07em}
.navBtn:hover{border-color:rgba(209,162,74,.55);background:rgba(28,24,16,.55)} .navBtn.active{border-color:var(--accent);background:rgba(209,162,74,.1)}
header{margin-left:240px;padding:18px 20px 0 20px;max-width:1700px}
.topBar{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:12px}
h1{margin:0;font-family:var(--headline);letter-spacing:.14em;text-transform:uppercase;font-size:30px;font-weight:500;line-height:1}
.sub{color:var(--muted);font-size:12px;margin-top:6px}
.controls{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
button{background:rgba(15,15,15,.88);border:1px solid rgba(209,162,74,.36);color:var(--text);padding:9px 12px;border-radius:0;cursor:pointer;font-family:var(--terminal);box-shadow:0 10px 25px rgba(0,0,0,.25)}
button:hover{filter:brightness(1.06)}
.filterBtn.active{border-color:var(--accent);background:rgba(209,162,74,.12)}
.wrap{margin-left:240px;padding:12px 20px 30px 20px;max-width:1700px}
.card{background:linear-gradient(180deg, rgba(14,14,14,.94), rgba(10,10,10,.96));border:1px solid var(--border);border-radius:0;box-shadow:var(--shadow);overflow:hidden;position:relative;margin-bottom:16px}
.card::before,.tile::before{content:"";position:absolute;inset:6px;border:1px solid rgba(209,162,74,.08);pointer-events:none}
.cardHeader{position:relative;padding:12px 14px;border-bottom:1px solid rgba(255,255,255,.06);display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;align-items:center}
.cardTitle{font-family:var(--headline);letter-spacing:.14em;text-transform:uppercase;font-size:15px;color:var(--muted)}
.cardBody{padding:10px 14px 14px}
.pill{font-size:11px;padding:5px 9px;border:1px solid rgba(209,162,74,.32);background:rgba(255,255,255,.03);color:var(--muted)}
.gmGrid{display:grid;grid-template-columns:290px 1fr 340px;gap:14px}
#gmMap{height:620px;width:100%}
.gmFeedWrap{max-height:620px;overflow:auto;padding:10px;display:grid;gap:8px}
.gmFeedItem{border:1px solid rgba(209,162,74,.2);padding:8px;background:rgba(9,9,9,.72);display:grid;gap:3px}
.gmDot{width:10px;height:10px;border:1px solid rgba(241,238,232,.65);border-radius:50%}
.gmMeterTrack{height:10px;background:rgba(255,255,255,.08);border:1px solid var(--border)}
.gmMeterFill{height:100%;background:linear-gradient(90deg,#ff9f43,#ff4d4d)}
.k{color:var(--muted);font-size:11px;margin-bottom:6px}.v{font-size:14px}
.gmBottomStrip{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}
.tile{position:relative;background:rgba(12,12,12,.7);border:1px solid rgba(209,162,74,.36);overflow:hidden}
.tileHeader{padding:10px 12px 8px;border-bottom:1px solid rgba(255,255,255,.06)} .tileTitle{font-size:12px;color:var(--muted)} .tileBody{padding:10px 10px 12px}
.maplibregl-popup-content{background:#111;border:1px solid var(--border);color:var(--text);font-family:var(--terminal);max-width:280px}
.maplibregl-ctrl-group{background:#111;border:1px solid var(--border)} .maplibregl-ctrl button{background:#111;color:var(--text)}
@media(max-width:1200px){.gmGrid{grid-template-columns:1fr}#gmMap{height:480px}.gmBottomStrip{grid-template-columns:1fr}}
@media (max-width:980px){.sidePanel{position:static;transform:none;width:auto;margin:12px}header,.wrap{margin-left:0}}
</style>
</head>
<body>
<div class="sidePanel">
  <div class="panelTitle">Pages</div>
  <a class="navBtn" href="index.html">Dashboard</a>
  <a class="navBtn active" href="conflict-monitor.html">Global Monitor</a>
</div>

<header>
  <div class="topBar">
    <div>
      <h1>Global Monitor</h1>
      <div class="sub">Iran • Israel • Gulf • Last 60 minutes</div>
    </div>
    <div class="controls" id="filterControls"></div>
  </div>
</header>

<main class="wrap">
  <section class="gmGrid">
    <div class="card" id="escalationCard"></div>
    <div class="card">
      <div class="cardHeader"><div class="cardTitle">Regional Escalation Map</div><span class="pill">MapLibre • Live Window</span></div>
      <div class="cardBody" style="padding:0;"><div id="gmMap"></div></div>
    </div>
    <div class="card">
      <div class="cardHeader"><div class="cardTitle">Live Event Feed</div><button id="sortBtn">Newest first</button></div>
      <div class="gmFeedWrap" id="feedContainer"></div>
    </div>
  </section>

  <section class="card">
    <div class="cardHeader"><div class="cardTitle">Market Strip</div><span class="pill" id="marketUpdated"></span></div>
    <div class="cardBody"><div class="gmBottomStrip" id="marketContainer"></div></div>
  </section>
</main>

<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<script type="module">
import { createGlobalMonitorMap } from './components/global-monitor/GlobalMonitorMap.js';
import { renderEscalationPanel } from './components/global-monitor/EscalationPanel.js';
import { renderLiveFeed } from './components/global-monitor/LiveEventFeed.js';
import { renderBottomMarketStrip } from './components/global-monitor/BottomMarketStrip.js';
import { seedMockEvents, ingestStories, subscribe, getFilteredEvents, getSummary, setMarkets } from './lib/global-monitor/eventStore.js';
import { MOCK_MARKETS, MOCK_X_STORIES } from './lib/global-monitor/mockData.js';

const FILTERS = [
  { key: 'all', label: 'All' },
  { key: 'strike', label: 'Strikes' },
  { key: 'missile_launch', label: 'Missile Launches' },
  { key: 'interception', label: 'Interceptions' },
  { key: 'infrastructure', label: 'Infrastructure' },
  { key: 'oil', label: 'Oil' },
  { key: 'statement', label: 'Statements' },
];

let activeFilter = 'all';
let newestFirst = true;
const mapApi = createGlobalMonitorMap('gmMap');

function renderFilters() {
  const root = document.getElementById('filterControls');
  root.innerHTML = '';
  FILTERS.forEach((filter) => {
    const button = document.createElement('button');
    button.className = `filterBtn ${activeFilter === filter.key ? 'active' : ''}`;
    button.textContent = filter.label;
    button.onclick = () => { activeFilter = filter.key; renderFilters(); refreshView(); };
    root.appendChild(button);
  });
}

function refreshView() {
  let events = getFilteredEvents({ category: activeFilter });
  if (!newestFirst) events = [...events].reverse();
  renderLiveFeed(document.getElementById('feedContainer'), events);
  renderEscalationPanel(document.getElementById('escalationCard'), getSummary({ category: activeFilter }));
  mapApi.update(events);
}

document.getElementById('sortBtn').onclick = () => {
  newestFirst = !newestFirst;
  document.getElementById('sortBtn').textContent = newestFirst ? 'Newest first' : 'Oldest first';
  refreshView();
};

subscribe((snapshot) => {
  renderBottomMarketStrip(document.getElementById('marketContainer'), snapshot.markets);
  if (snapshot.markets?.polymarket?.updated_at) {
    document.getElementById('marketUpdated').textContent = `Updated ${new Date(snapshot.markets.polymarket.updated_at).toLocaleTimeString()}`;
  }
  refreshView();
}, { category: activeFilter });

async function ingestFromBackendOrMock() {
  try {
    const response = await fetch('/api/global-monitor/events?window=60m&category=all');
    if (!response.ok) throw new Error('No API');
    const data = await response.json();
    ingestStories(data.events || []);
  } catch {
    // TODO: replace with server-side X ingestion credentials in production
    ingestStories(MOCK_X_STORIES);
  }
}

renderFilters();
seedMockEvents();
setMarkets(MOCK_MARKETS);
await ingestFromBackendOrMock();
setInterval(ingestFromBackendOrMock, 20000);

window.addEventListener('gm-focus-feed-item', (event) => {
  const id = event.detail?.id;
  if (!id) return;
  const el = document.querySelector(`[data-event-id="${id}"]`);
  if (!el) return;
  el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  el.style.outline = '1px solid rgba(209,162,74,.65)';
  setTimeout(() => { el.style.outline = ''; }, 1800);
});
</script>
</body>
</html>
