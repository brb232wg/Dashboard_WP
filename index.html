<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Br's Financial Macro Dashboard</title>

  <style>
    :root{
      --bg:#070a10;
      --panel:#0f1726;
      --panel2:#0c1320;
      --text:#e6edf3;
      --muted:#9aa7b2;
      --good:#19c37d;
      --bad:#ff4d4f;
      --border:#1c2a40;
      --shadow: 0 16px 40px rgba(0,0,0,.45);
      --radius: 18px;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono","Courier New", monospace;
      --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:var(--sans);
      color:var(--text);
      background:var(--bg);
      overflow-x:hidden;
    }

    /* Dancing cat background (subtle) */
    body::before{
      content:"";
      position:fixed;
      inset:0;
      z-index:-2;
      background:
        radial-gradient(1000px 700px at 15% 15%, rgba(25,195,125,.12), transparent 60%),
        radial-gradient(1000px 700px at 85% 10%, rgba(100,149,237,.14), transparent 60%),
        url("https://media.giphy.com/media/JIX9t2j0ZTN9S/giphy.gif");
      background-repeat:no-repeat, no-repeat, repeat;
      background-size:auto, auto, 220px auto;
      background-position:center, center, 0 0;
      opacity:.12;
      pointer-events:none;
    }
    body::after{
      content:"";
      position:fixed;
      inset:0;
      z-index:-1;
      background: linear-gradient(180deg, rgba(7,10,16,.84), rgba(7,10,16,.93));
      pointer-events:none;
    }

    header{
      position:sticky; top:0; z-index:10;
      backdrop-filter: blur(12px);
      background: rgba(7,10,16,.65);
      border-bottom:1px solid rgba(28,42,64,.75);
    }
    .wrap{
      width:min(1700px, calc(100vw - 28px));
      margin:0 auto;
      padding:14px 0;
    }

    .topRow{
      display:flex; align-items:flex-start; justify-content:space-between;
      gap:14px; flex-wrap:wrap;
      padding:0 14px;
    }

    .btcStrip{
      flex: 1 1 720px;
      background: linear-gradient(180deg, rgba(15,23,38,.92), rgba(10,16,28,.92));
      border:1px solid rgba(28,42,64,.9);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding:12px 14px;
      overflow:hidden;
    }
    .btcTitle{
      display:flex; align-items:center; justify-content:space-between; gap:10px;
      color:var(--muted);
      font-size:12px;
    }
    .btcMain{
      display:flex; align-items:baseline; justify-content:space-between; gap:14px; flex-wrap:wrap;
      margin-top:8px;
    }
    .btcPrice{
      font-family:var(--mono);
      font-size:44px;
      font-weight:800;
      letter-spacing:-.6px;
      margin:0;
    }
    .btcSide{
      display:grid;
      grid-template-columns: repeat(4, minmax(140px, 1fr));
      gap:10px;
      width:min(780px, 100%);
    }
    .mini{
      border:1px solid rgba(28,42,64,.8);
      background: rgba(255,255,255,.03);
      border-radius: 14px;
      padding:10px;
      min-height:56px;
    }
    .k{font-size:11px; color:var(--muted); margin-bottom:6px}
    .v{font-size:14px; font-family: var(--mono)}
    .delta.good{color:var(--good)}
    .delta.bad{color:var(--bad)}

    .controls{
      flex: 0 0 auto;
      display:flex; align-items:center; gap:10px; flex-wrap:wrap;
      color:var(--muted);
      font-size:12px;
      padding:0 0;
    }
    select, button{
      background: rgba(12,19,32,.9);
      color: var(--text);
      border:1px solid rgba(28,42,64,.9);
      padding:8px 10px;
      border-radius:12px;
      font-family: var(--sans);
      cursor:pointer;
    }
    button:hover{filter:brightness(1.05)}
    .pill{
      font-size:11px;
      padding:4px 8px;
      border-radius:999px;
      border:1px solid rgba(28,42,64,.9);
      background: rgba(255,255,255,.03);
      color: var(--muted);
      font-family: var(--mono);
      white-space:nowrap;
    }

    main{padding:14px 0 30px}

    .grid{
      display:grid;
      grid-template-columns: repeat(12, 1fr);
      gap:14px;
      padding:0 14px;
    }
    .card{
      background: linear-gradient(180deg, rgba(15,23,38,.92), rgba(10,16,28,.92));
      border:1px solid rgba(28,42,64,.9);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding:14px;
      overflow:hidden;
    }
    .span-12{grid-column: span 12;}

    .marketsGrid{
      display:grid;
      grid-template-columns: repeat(12, 1fr);
      gap:14px;
    }
    .w6{grid-column: span 6;}
    .w4{grid-column: span 4;}
    .embedCard{padding:0; overflow:hidden;}
    .embedHeader{
      padding:10px 12px 8px 12px;
      border-bottom:1px solid rgba(255,255,255,.06);
      display:flex; justify-content:space-between; align-items:center; gap:10px;
    }
    .embedTitle{font-size:12px; color:var(--muted)}
    .embedBody{padding:8px 10px 12px 10px}
    .foot{
      margin-top:12px;
      font-size:12px;
      color:var(--muted);
      display:flex; justify-content:space-between; gap:10px; flex-wrap:wrap;
    }
    .err{
      margin-top:10px;
      border:1px solid rgba(255,77,79,.45);
      background: rgba(255,77,79,.08);
      padding:10px 12px;
      border-radius:12px;
      color:#ffd7d7;
      font-size:12px;
      display:none;
      white-space:pre-wrap;
    }

    @media (max-width: 1180px){
      .btcSide{grid-template-columns: repeat(2, 1fr);}
      .w6,.w4{grid-column: span 12;}
      .btcPrice{font-size:38px}
    }
    @media (max-width: 520px){
      .btcSide{grid-template-columns: 1fr;}
      .btcPrice{font-size:34px}
    }
  </style>
</head>

<body>

<header>
  <div class="wrap">
    <div class="topRow">
      <!-- Top BTC strip -->
      <div class="btcStrip">
        <div class="btcTitle">
          <div>BTC / USD (Coinbase Exchange)</div>
          <div class="pill" id="btcUpdated">–</div>
        </div>

        <div class="btcMain">
          <div>
            <div class="btcPrice" id="btcPrice">$–</div>
            <div class="v" id="btcChange">24h: –</div>
          </div>

          <div class="btcSide">
            <div class="mini">
              <div class="k">24h High</div>
              <div class="v" id="btcHigh">–</div>
            </div>
            <div class="mini">
              <div class="k">24h Low</div>
              <div class="v" id="btcLow">–</div>
            </div>
            <div class="mini">
              <div class="k">24h Volume (BTC)</div>
              <div class="v" id="btcVol">–</div>
            </div>
            <div class="mini">
              <div class="k">Sats per $1</div>
              <div class="v" id="satsPerUsd">–</div>
            </div>
          </div>
        </div>

        <div class="err" id="btcErr"></div>
      </div>

      <!-- Controls -->
      <div class="controls">
        <label>Auto refresh</label>
        <select id="refreshEvery">
          <option value="0">Off</option>
          <option value="30">30s</option>
          <option value="60" selected>60s</option>
          <option value="120">2m</option>
          <option value="300">5m</option>
        </select>
        <button id="btnRefresh">Refresh</button>

        <!-- Music toggle (requires click) -->
        <button id="btnMusic">Play music</button>

        <span class="pill" id="status">Idle</span>
      </div>
    </div>
  </div>
</header>

<main class="wrap">
  <div class="grid">
    <!-- Markets -->
    <section class="card span-12">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;">
        <div style="color:var(--muted);font-size:13px;">Markets (USD where applicable)</div>
        <span class="pill">10Y • SPY • QQQ • MSTR • XAUUSD • OIL • BTC</span>
      </div>

      <div class="marketsGrid" style="margin-top:12px;">
        <!-- 10Y yield -->
        <div class="card embedCard w4"><div id="tv_10y"></div></div>

        <!-- Equities -->
        <div class="card embedCard w4"><div id="tv_spy"></div></div>
        <div class="card embedCard w4"><div id="tv_qqq"></div></div>
        <div class="card embedCard w4"><div id="tv_mstr"></div></div>

        <!-- Commodities -->
        <div class="card embedCard w4"><div id="tv_gold"></div></div>
        <div class="card embedCard w4"><div id="tv_oil"></div></div>

        <!-- BTC big -->
        <div class="card embedCard w6"><div id="tv_btc"></div></div>
      </div>

      <div class="foot">
        <span>BTC data: Coinbase Exchange. Charts: TradingView widgets. “Sats per $1” computed from BTC/USD.</span>
        <span class="pill" id="lastAll">Last refresh: –</span>
      </div>
    </section>
  </div>
</main>

<!-- Music: put your file in repo at /assets/music.mp3 -->
<audio id="bgMusic" loop preload="auto">
  <source src="assets/music.mp3" type="audio/mpeg">
  Your browser does not support the audio element.
</audio>

<script>
  const $ = (id) => document.getElementById(id);

  function fmtUSD2(n){
    if (n == null || Number.isNaN(n)) return "–";
    return new Intl.NumberFormat(undefined, { style:"currency", currency:"USD", maximumFractionDigits: 2 }).format(n);
  }
  function fmtNum(n){
    if (n == null || Number.isNaN(n)) return "–";
    return new Intl.NumberFormat(undefined, { maximumFractionDigits: 2 }).format(n);
  }
  function fmtNum0(n){
    if (n == null || Number.isNaN(n)) return "–";
    return new Intl.NumberFormat(undefined, { maximumFractionDigits: 0 }).format(n);
  }
  function nowStamp(){ return new Date().toLocaleString(); }
  function setStatus(text){ $("status").textContent = text; }
  function showErr(el, msg){ const b=$(el); b.style.display="block"; b.textContent=msg; }
  function clearErr(el){ const b=$(el); b.style.display="none"; b.textContent=""; }

  async function fetchJSON(url){
    const res = await fetch(url, { headers:{ "Accept":"application/json" }});
    if(!res.ok) throw new Error(`${url} HTTP ${res.status}`);
    return res.json();
  }

  // BTC from Coinbase Exchange (reliable + direct)
  async function fetchBTC(){
    clearErr("btcErr");
    const [ticker, stats] = await Promise.all([
      fetchJSON("https://api.exchange.coinbase.com/products/BTC-USD/ticker"),
      fetchJSON("https://api.exchange.coinbase.com/products/BTC-USD/stats")
    ]);

    const price = Number(ticker.price);
    const open  = Number(stats.open);
    const high  = Number(stats.high);
    const low   = Number(stats.low);
    const vol   = Number(stats.volume);

    $("btcPrice").textContent = fmtUSD2(price);

    const chPct = (open && price) ? ((price - open) / open) * 100 : null;
    const cls = (chPct ?? 0) >= 0 ? "good" : "bad";
    $("btcChange").innerHTML = `24h: <span class="delta ${cls}">${fmtNum(chPct)}%</span>`;

    $("btcHigh").textContent = fmtUSD2(high);
    $("btcLow").textContent  = fmtUSD2(low);
    $("btcVol").textContent  = fmtNum(vol);

    // sats per $1 = 1e8 / BTCUSD
    const sats = price ? (1e8 / price) : null;
    $("satsPerUsd").textContent = sats ? `${fmtNum0(sats)} sats` : "–";

    $("btcUpdated").textContent = `Updated ${new Date().toLocaleTimeString()}`;
  }

  // TradingView embeds
  function miniSymbol(containerId, symbol, title){
    const el = document.getElementById(containerId);
    if(!el) return;

    el.innerHTML = `
      <div class="embedHeader">
        <div class="embedTitle">${title}</div>
        <div class="pill">${symbol}</div>
      </div>
      <div class="embedBody">
        <div class="tradingview-widget-container"></div>
      </div>
    `;

    const script = document.createElement("script");
    script.src = "https://s3.tradingview.com/external-embedding/embed-widget-mini-symbol-overview.js";
    script.async = true;
    script.innerHTML = JSON.stringify({
      symbol,
      width: "100%",
      height: 260,
      locale: "en",
      dateRange: "12M",
      colorTheme: "dark",
      isTransparent: true,
      autosize: true,
      chartOnly: false
    });

    el.querySelector(".tradingview-widget-container").appendChild(script);
  }

  function bigSymbol(containerId, symbol, title){
    const el = document.getElementById(containerId);
    if(!el) return;

    el.innerHTML = `
      <div class="embedHeader">
        <div class="embedTitle">${title}</div>
        <div class="pill">${symbol}</div>
      </div>
      <div class="embedBody">
        <div class="tradingview-widget-container"></div>
      </div>
    `;

    const script = document.createElement("script");
    script.src = "https://s3.tradingview.com/external-embedding/embed-widget-symbol-overview.js";
    script.async = true;
    script.innerHTML = JSON.stringify({
      symbols: [[title, symbol]],
      chartOnly: false,
      width: "100%",
      height: 320,
      locale: "en",
      colorTheme: "dark",
      autosize: true,
      showVolume: true,
      showMA: false,
      hideDateRanges: false,
      hideMarketStatus: false,
      hideSymbolLogo: false,
      scalePosition: "right",
      scaleMode: "Normal",
      fontFamily: "system-ui",
      fontSize: "12",
      valuesTracking: "1",
      changeMode: "price-and-percent",
      chartType: "area",
      isTransparent: true
    });

    el.querySelector(".tradingview-widget-container").appendChild(script);
  }

  function initWidgets(){
    // 10Y: use TNX (widely supported). It's yield (not price) but it's the standard “10Y”.
    miniSymbol("tv_10y",  "CBOE:TNX", "US 10Y Yield (TNX)");

    // Equities
    miniSymbol("tv_spy",  "AMEX:SPY", "S&P 500 (SPY)");
    miniSymbol("tv_qqq",  "NASDAQ:QQQ","Nasdaq 100 (QQQ)");
    miniSymbol("tv_mstr", "NASDAQ:MSTR","MicroStrategy (MSTR)");

    // Commodities in USD
    miniSymbol("tv_gold", "OANDA:XAUUSD","Gold / USD (oz)");
    // Oil: this is a liquid USD proxy. If you want futures later we can swap to CL1! if it loads on your network.
    miniSymbol("tv_oil",  "AMEX:USO", "WTI Oil Proxy (USO)");

    // BTC chart
    bigSymbol("tv_btc", "COINBASE:BTCUSD", "Bitcoin (BTCUSD)");
  }

  async function refreshAll(){
    setStatus("Refreshing…");
    const start = performance.now();
    try {
      await fetchBTC();
    } catch (e){
      showErr("btcErr", e.message);
    } finally {
      const ms = Math.round(performance.now() - start);
      setStatus(`OK • ${ms}ms`);
      $("lastAll").textContent = `Last refresh: ${nowStamp()}`;
      setTimeout(() => setStatus("Idle"), 1400);
    }
  }

  // Music toggle (user gesture required)
  const music = $("bgMusic");
  const btnMusic = $("btnMusic");
  let musicOn = false;

  btnMusic.addEventListener("click", async () => {
    try{
      if(!musicOn){
        await music.play();         // will work after click
        musicOn = true;
        btnMusic.textContent = "Pause music";
      } else {
        music.pause();
        musicOn = false;
        btnMusic.textContent = "Play music";
      }
    } catch (e){
      alert("Music couldn't start (browser blocked it). Try clicking again, or ensure assets/music.mp3 exists.");
    }
  });

  // Auto refresh
  let timer = null;
  function setAutoRefresh(seconds){
    if(timer) clearInterval(timer);
    timer = null;
    if(seconds > 0){
      timer = setInterval(refreshAll, seconds * 1000);
    }
  }
  $("btnRefresh").addEventListener("click", refreshAll);
  $("refreshEvery").addEventListener("change", (e) => setAutoRefresh(parseInt(e.target.value, 10)));

  initWidgets();
  refreshAll();
  setAutoRefresh(parseInt($("refreshEvery").value, 10));
</script>
</body>
</html>
