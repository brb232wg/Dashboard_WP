<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Br's Macro War Room</title>

<link rel="icon" href="./assets/favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="./assets/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="./assets/favicon-16x16.png">
<link rel="apple-touch-icon" sizes="180x180" href="./assets/apple-touch-icon.png">
<link rel="manifest" href="./assets/site.webmanifest">
<meta name="theme-color" content="#05080f">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#05080f;
  --panel:#0b1220;
  --text:#e6edf3;
  --muted:#7f8ea3;
  --good:#19c37d;
  --bad:#ff4d4f;
  --accent:#19c37d;

  --radius:16px;
  --border: rgba(55, 85, 130, .45);
  --border2: rgba(70, 120, 190, .55);
  --shadow: 0 18px 55px rgba(0,0,0,.55);

  --terminal: 'Share Tech Mono', ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
  --headline: 'Orbitron', system-ui, sans-serif;
}

*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:var(--terminal);
  overflow-x:hidden;
}

/* ===== BACKGROUND VIDEO GRID ===== */
.bgWall{
  position:fixed;
  inset:0;
  z-index:-3;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  grid-auto-rows:180px;
  gap:10px;
  padding:14px;
  opacity:.18;
  pointer-events:none;
}
.bgTile{
  width:100%;
  height:100%;
  object-fit:cover;
  border-radius:16px;
  filter: blur(1px) brightness(.76) contrast(1.05);
}

/* Overlay */
body::after{
  content:"";
  position:fixed;
  inset:0;
  z-index:-2;
  background:
    radial-gradient(1000px 700px at 15% 15%, rgba(25,195,125,.12), transparent 60%),
    radial-gradient(1000px 700px at 85% 10%, rgba(100,149,237,.14), transparent 60%),
    linear-gradient(180deg, rgba(5,8,15,.90), rgba(5,8,15,.96));
  pointer-events:none;
}

/* ===== SIDE PANEL ===== */
.sidePanel{
  position:fixed;
  top:50%;
  left:0;
  transform:translateY(-50%);
  width:230px;
  background:rgba(7,12,22,.94);
  border-right:1px solid var(--border);
  padding:18px 12px;
  display:flex;
  flex-direction:column;
  gap:12px;
  z-index:10;
  backdrop-filter: blur(10px);
  box-shadow: 12px 0 40px rgba(0,0,0,.35);
}

.panelTitle{
  font-family:var(--headline);
  font-size:12px;
  color:var(--muted);
  text-transform:uppercase;
  letter-spacing:1.4px;
  margin-bottom:4px;
}

.modeBtn{
  background:rgba(16,26,44,.75);
  border:1px solid rgba(55,85,130,.55);
  padding:10px;
  border-radius:12px;
  color:var(--text);
  cursor:pointer;
  font-family:var(--terminal);
  transition:.18s ease;
  text-align:left;
}
.modeBtn:hover{
  border-color: rgba(25,195,125,.55);
  background: rgba(20,40,70,.55);
}
.modeBtn.active{
  border-color: var(--accent);
  box-shadow: 0 0 16px rgba(25,195,125,.35);
  background: rgba(25,195,125,.08);
}

.notePanel{
  border:1px solid rgba(55,85,130,.45);
  background:rgba(9,16,29,.75);
  border-radius:14px;
  padding:10px;
  margin-bottom:6px;
}
.noteRow{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:8px;
  margin-bottom:8px;
}
.noteBtns{
  display:flex;
  gap:6px;
}
.noteBtn{
  width:28px;
  height:28px;
  border-radius:9px;
  padding:0;
  font-weight:700;
  line-height:1;
}
.noteArea{
  width:100%;
  min-height:118px;
  resize:vertical;
  border-radius:10px;
  border:1px solid rgba(70,120,190,.5);
  background:rgba(3,8,18,.75);
  color:var(--text);
  padding:8px;
  font-family:var(--terminal);
  font-size:12px;
}
.noteHint{
  margin-top:6px;
  color:var(--muted);
  font-size:10px;
}

/* ===== TOP BAR ===== */
header{
  margin-left:240px;
  padding:18px 20px 0 20px;
  max-width:1700px;
}

.topBar{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:12px;
  flex-wrap:wrap;
  margin-bottom:12px;
}

h1{
  margin:0;
  font-family:var(--headline);
  letter-spacing:2px;
  text-transform:uppercase;
  font-size:18px;
}
.sub{
  color:var(--muted);
  font-size:12px;
  margin-top:6px;
}

.controls{
  display:flex;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
}

select, button{
  background:rgba(12,20,35,.72);
  border:1px solid rgba(55,85,130,.65);
  color:var(--text);
  padding:9px 12px;
  border-radius:12px;
  cursor:pointer;
  font-family:var(--terminal);
  box-shadow: 0 10px 25px rgba(0,0,0,.25);
}
button:hover{filter:brightness(1.06)}
.pill{
  font-size:11px;
  padding:5px 9px;
  border-radius:999px;
  border:1px solid rgba(55,85,130,.65);
  background: rgba(255,255,255,.03);
  color: var(--muted);
}

/* ===== MAIN ===== */
.wrap{
  margin-left:240px;
  padding:12px 20px 30px 20px;
  max-width:1700px;
}

.card{
  background: linear-gradient(180deg, rgba(10,16,30,.92), rgba(8,12,24,.92));
  border:1px solid var(--border);
  border-radius:var(--radius);
  box-shadow: var(--shadow);
  overflow:hidden;
  margin-bottom:16px;
}

.cardHeader{
  padding:12px 14px;
  border-bottom:1px solid rgba(255,255,255,.06);
  display:flex;
  justify-content:space-between;
  gap:10px;
  flex-wrap:wrap;
  align-items:center;
}

.cardTitle{
  font-family:var(--headline);
  letter-spacing:1px;
  text-transform:uppercase;
  font-size:12px;
  color:var(--muted);
}

.cardBody{ padding: 10px 14px 14px 14px; }

.btcPrice{
  font-size:44px;
  font-family:var(--headline);
  letter-spacing:-.5px;
  margin-top:8px;
}

.delta.good{color:var(--good)}
.delta.bad{color:var(--bad)}

.miniStats{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:10px;
  margin-top:12px;
}

.statBox{
  background:rgba(255,255,255,.03);
  border:1px solid rgba(55,85,130,.45);
  border-radius:12px;
  padding:10px;
}

.k{ color: var(--muted); font-size: 11px; margin-bottom: 6px; }
.v{ font-size: 14px; }

/* ===== Markets Grid ===== */
/* Default: responsive auto-fit */
.marketsGrid{
  display:grid;
  gap:14px;
  grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
}

/* Force 5 per row on wide screens */
@media (min-width: 1500px){
  .marketsGrid{
    grid-template-columns: repeat(5, 1fr);
  }
}

/* Tiles */
.tile{
  background: rgba(6,10,18,.55);
  border: 1px solid rgba(70, 120, 190, .50);
  border-radius: 16px;
  overflow:hidden;
  box-shadow: 0 12px 40px rgba(0,0,0,.35);
}
.tileHeader{
  padding:10px 12px 8px 12px;
  border-bottom:1px solid rgba(255,255,255,.06);
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
}
.tileTitle{
  font-size:12px;
  color:var(--muted);
}
.tileBody{
  padding:10px 10px 12px 10px;
}

/* ===== NEWS TICKER + RANGE BUTTONS (where you circled) ===== */
.marketTopRow{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  flex-wrap:wrap;
}

.tickerBar{
  flex: 1 1 640px;
  position: relative;
  height: 40px;
  border-radius: 14px;
  overflow: hidden;
  border: 1px solid rgba(70,120,190,.45);
  background: rgba(255,255,255,.03);
}

.tickerInner{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  gap:28px;
  padding: 0 14px;
  white-space:nowrap;
  will-change: transform;
  animation: tickerMove 26s linear infinite;
}

.tickerItem{
  color: var(--muted);
  font-size: 12px;
}
.tickerItem a{
  color: var(--text);
  text-decoration: none;
  border-bottom: 1px solid rgba(255,255,255,.18);
}
.tickerItem a:hover{
  border-bottom-color: rgba(25,195,125,.55);
}

@keyframes tickerMove{
  0%{ transform: translateX(0); }
  100%{ transform: translateX(-50%); }
}

.rangeGroup{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}
.rangeBtn{
  padding:8px 10px;
  border-radius:12px;
  border:1px solid rgba(55,85,130,.65);
  background: rgba(12,20,35,.72);
}
.rangeBtn.active{
  border-color: var(--accent);
  box-shadow: 0 0 14px rgba(25,195,125,.25);
  background: rgba(25,195,125,.08);
}

/* Responsive */
@media (max-width: 980px){
  .sidePanel{ position:static; transform:none; width:auto; margin:12px; }
  header,.wrap{ margin-left:0; }
}
</style>
</head>

<body>

<!-- Background video wall -->
<div class="bgWall" aria-hidden="true">
  <video class="bgTile" autoplay muted loop playsinline><source src="assets/bg.mp4" type="video/mp4"></video>
  <video class="bgTile" autoplay muted loop playsinline><source src="assets/bg.mp4" type="video/mp4"></video>
  <video class="bgTile" autoplay muted loop playsinline><source src="assets/bg.mp4" type="video/mp4"></video>
  <video class="bgTile" autoplay muted loop playsinline><source src="assets/bg.mp4" type="video/mp4"></video>
  <video class="bgTile" autoplay muted loop playsinline><source src="assets/bg.mp4" type="video/mp4"></video>
  <video class="bgTile" autoplay muted loop playsinline><source src="assets/bg.mp4" type="video/mp4"></video>
</div>

<!-- Side Panel -->
<div class="sidePanel">
  <div class="notePanel">
    <div class="noteRow">
      <div class="panelTitle" style="margin:0;">Notes</div>
      <div class="noteBtns" aria-label="Note actions">

<!-- Top header -->

    <div class="cardHeader">

          <div class="cardTitle" id="modeTitle">Devil's Chess Board</div>

        <!-- THIS IS THE SPOT YOU CIRCLED: ticker + timeframe buttons -->

          <button class="rangeBtn active" data-range="1D">Daily</button>

<!-- Music -->

<script>
  const $ = (id) => document.getElementById(id);

  // ===== Global chart range (applies to ALL charts) =====
  // TradingView mini widget supports: 1D, 5D, 1M, 3M, 6M, 12M, 60M, ALL
  let currentRange = "1D";

  // ---------- Formatting ----------
  function fmtUSD2(n){
    if (n == null || Number.isNaN(n)) return "–";
    return new Intl.NumberFormat(undefined, { style:"currency", currency:"USD", maximumFractionDigits: 2 }).format(n);
  }
  function fmtNum(n){
    if (n == null || Number.isNaN(n)) return "–";
    return new Intl.NumberFormat(undefined, { maximumFractionDigits: 2 }).format(n);
  }
  function fmtNum0(n){
    if (n == null || Number.isNaN(n)) return "–";
    return new Intl.NumberFormat(undefined, { maximumFractionDigits: 0 }).format(n);
  }
  function setStatus(t){ $("status").textContent = t; }
  function nowTime(){ return new Date().toLocaleTimeString(); }

  // ---------- Data (BTC + GBPUSD) ----------
  async function fetchJSON(url){
    const res = await fetch(url, { headers:{ "Accept":"application/json" }});
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    return res.json();
  }

  async function fetchBTC(){
    const [ticker, stats] = await Promise.all([
      fetchJSON("https://api.exchange.coinbase.com/products/BTC-USD/ticker"),
      fetchJSON("https://api.exchange.coinbase.com/products/BTC-USD/stats")
    ]);

    const price = Number(ticker.price);
    const open  = Number(stats.open);
    const high  = Number(stats.high);
    const low   = Number(stats.low);
    const vol   = Number(stats.volume);

    $("btcPrice").textContent = fmtUSD2(price);

    const chPct = (open && price) ? ((price - open) / open) * 100 : null;
    const cls = (chPct ?? 0) >= 0 ? "good" : "bad";
    $("btcChange").innerHTML = `24h: <span class="delta ${cls}">${fmtNum(chPct)}%</span>`;

    $("btcHigh").textContent = fmtUSD2(high);
    $("btcLow").textContent  = fmtUSD2(low);
    $("btcVol").textContent  = fmtNum(vol);

    const sats = price ? (1e8 / price) : null;
    $("satsPerUsd").textContent = sats ? `${fmtNum0(sats)} sats` : "–";

    $("btcUpdated").textContent = `Updated ${nowTime()}`;
  }

  async function fetchGBPUSD(){
    const j = await fetchJSON("https://open.er-api.com/v6/latest/GBP");
    const rate = j?.rates?.USD;
    $("gbpUsd").textContent = rate ? `1 GBP = ${fmtNum(rate)} USD` : "–";
  }

  async function refreshAll(){
    setStatus("Refreshing…");
    const start = performance.now();

    try{
      await Promise.all([fetchBTC(), fetchGBPUSD()]);
      const ms = Math.round(performance.now() - start);
      setStatus(`OK • ${ms}ms`);
    } catch(e){
      setStatus("Error");
      console.warn(e);
    } finally {
      setTimeout(() => setStatus("Idle"), 1200);
    }
  }

  // ---------- Ticker ----------
  function buildTicker(items){
    // We duplicate items so the animation can loop smoothly (moving -50%)
    const safe = (items && items.length) ? items : [{ text:"Add headlines in assets/ticker.json", url:"" }];

    const doubled = [...safe, ...safe];
    const inner = $("tickerInner");
    inner.innerHTML = "";

    doubled.forEach(it => {
      const span = document.createElement("span");
      span.className = "tickerItem";

      const text = (it && it.text) ? it.text : "";
      const url  = (it && it.url) ? it.url : "";

      if(url){
        const a = document.createElement("a");
        a.href = url;
        a.target = "_blank";
        a.rel = "noopener noreferrer";
        a.textContent = text;
        span.appendChild(a);
      } else {
        span.textContent = text;
      }
      inner.appendChild(span);
    });

    // If items are short, speed up less; if long, keep default.
    // (We keep it simple; you can tune CSS animation duration too.)
  }

  async function loadTicker(){
    const username = "DeItaone";

    // Use a CORS-friendly proxy + RSS feed so this works from static hosting.
    // Reloading the page fetches a fresh feed snapshot.
    const rssUrl = `https://nitter.poast.org/${username}/rss`;
    const proxied = `https://api.allorigins.win/raw?url=${encodeURIComponent(rssUrl)}`;

    try{
      const res = await fetch(proxied, { cache: "no-store" });
      if(!res.ok) throw new Error(`HTTP ${res.status}`);

      const xmlText = await res.text();
      const doc = new DOMParser().parseFromString(xmlText, "application/xml");
      const entries = [...doc.querySelectorAll("item")].slice(0, 12);

      const items = entries.map((item) => {
        const title = (item.querySelector("title")?.textContent || "").trim();
        const link = (item.querySelector("link")?.textContent || "").trim();

        return {
          text: `@${username}: ${title || "Update"}`,
          url: link
        };
      }).filter((it) => it.text && it.url);

      if(!items.length) throw new Error("No feed items");
      buildTicker(items);
    } catch(e){
      console.warn("Ticker feed unavailable", e);
      buildTicker([
        { text:`@${username} feed unavailable right now`, url:"https://x.com/DeItaone" },
        { text:"Open profile on X for latest updates", url:"https://x.com/DeItaone" }
      ]);
    }

    // Final fallback keeps ticker useful and clickable.
    buildTicker([
      { text:`@${username}: Open latest posts`, url:profileUrl },
      { text:"Live feed temporarily unavailable", url:profileUrl },
      { text:"Tap here to view the profile", url:profileUrl }
    ]);
  }

  // ---------- TradingView helpers ----------
  function createTile(containerId, symbol, title){
    const tile = document.createElement("div");
    tile.className = "tile";

    tile.innerHTML = `
      <div class="tileHeader">
        <div class="tileTitle">${title}</div>
        <span class="pill">${symbol}</span>
      </div>
      <div class="tileBody">
        <div id="${containerId}"></div>
      </div>
    `;

    $("marketsGrid").appendChild(tile);

    const s = document.createElement("script");
    s.src = "https://s3.tradingview.com/external-embedding/embed-widget-mini-symbol-overview.js";
    s.async = true;
    s.innerHTML = JSON.stringify({
      symbol,
      width: "100%",
      height: 260,
      locale: "en",
      dateRange: currentRange,
      colorTheme: "dark",
      isTransparent: true,
      autosize: true,
      chartOnly: false
    });

    tile.querySelector(`#${containerId}`).appendChild(s);
  }

  // DXY real first (TVC:DXY), fallback to proxy (UUP)
  function createTileWithFallback(containerId, primarySymbol, primaryTitle, fallbackSymbol, fallbackTitle){
    const tile = document.createElement("div");
    tile.className = "tile";

    tile.innerHTML = `
      <div class="tileHeader">
        <div class="tileTitle">${primaryTitle}</div>
        <span class="pill">${primarySymbol}</span>
      </div>
      <div class="tileBody">
        <div id="${containerId}"></div>
      </div>
    `;
    $("marketsGrid").appendChild(tile);

    const mount = () => {
      const s = document.createElement("script");
      s.src = "https://s3.tradingview.com/external-embedding/embed-widget-mini-symbol-overview.js";
      s.async = true;
      s.innerHTML = JSON.stringify({
        symbol: primarySymbol,
        width: "100%",
        height: 260,
        locale: "en",
        dateRange: currentRange,
        colorTheme: "dark",
        isTransparent: true,
        autosize: true,
        chartOnly: false
      });
      tile.querySelector(`#${containerId}`).appendChild(s);
    };

    mount();

    // Best-effort fallback: after 2.6s if the tile text contains common TV block messages
    setTimeout(() => {
      const t = tile.innerText.toLowerCase();
      const blocked = t.includes("invalid symbol") || t.includes("only available on tradingview");

      if(blocked){
        tile.querySelector(".tileTitle").textContent = fallbackTitle;
        tile.querySelector(".pill").textContent = fallbackSymbol;

        const box = tile.querySelector(`#${containerId}`);
        box.innerHTML = "";

        const f = document.createElement("script");
        f.src = "https://s3.tradingview.com/external-embedding/embed-widget-mini-symbol-overview.js";
        f.async = true;
        f.innerHTML = JSON.stringify({
          symbol: fallbackSymbol,
          width: "100%",
          height: 260,
          locale: "en",
          dateRange: currentRange,
          colorTheme: "dark",
          isTransparent: true,
          autosize: true,
          chartOnly: false
        });
        box.appendChild(f);
      }
    }, 2600);
  }

  function loadBTCChart(){
    const host = document.getElementById("tv_btc_top");
    host.innerHTML = "";

    const s = document.createElement("script");
    s.src = "https://s3.tradingview.com/external-embedding/embed-widget-symbol-overview.js";
    s.async = true;

    // symbol-overview accepts a range-like config in some variants;
    // dateRange works reliably in mini widgets; here we pass it too (ignored if unsupported).
    s.innerHTML = JSON.stringify({
      symbols: [["BTCUSD","COINBASE:BTCUSD"]],
      width: "100%",
      height: 420,
      locale: "en",
      colorTheme: "dark",
      autosize: true,
      showVolume: true,
      chartType: "area",
      isTransparent: true,
      dateRange: currentRange
    });

    host.appendChild(s);
  }

  // ---------- Modes (max 10 charts / section) ----------
  let currentMode = "devil";

  function setMode(mode){
    currentMode = mode;
    $("marketsGrid").innerHTML = "";

    let count = 0;
    const add = (id, sym, title) => {
      if(count >= 10) return;
      count++;
      createTile(id, sym, title);
    };

    if(mode === "devil"){
      $("modeTitle").textContent = "Devil's Chess Board";
      $("modePill").textContent = "Equities";

      // Defense first
      add("m_eslt", "NASDAQ:ESLT", "Elbit Systems");
      add("m_rtx",  "NYSE:RTX",    "Raytheon");
      add("m_lmt",  "NYSE:LMT",    "Lockheed Martin");
      add("m_noc",  "NYSE:NOC",    "Northrop Grumman");
      add("m_gd",   "NYSE:GD",     "General Dynamics");

      // Then strategic tech / energy
      add("m_pltr", "NASDAQ:PLTR", "Palantir");          // FIXED
      add("m_nvda", "NASDAQ:NVDA", "Nvidia");
      add("m_orcl", "NYSE:ORCL",   "Oracle");
      add("m_amd",  "NASDAQ:AMD",  "AMD");
      add("m_uuuu", "AMEX:UUUU",   "Energy Fuels (UUUU)");
      return;
    }

    if(mode === "global"){
      $("modeTitle").textContent = "Global";
      $("modePill").textContent = "Macro";

      // Commodities first
      add("g_xau",  "OANDA:XAUUSD", "Gold (XAUUSD / oz)");
      add("g_xag",  "OANDA:XAGUSD", "Silver (XAGUSD / oz)");
      add("g_uso",  "AMEX:USO",     "Oil (USO / USD)");

      // Real DXY first, fallback to proxy
      if(count < 10){
        count++;
        createTileWithFallback(
          "g_dxy",
          "TVC:DXY",
          "US Dollar Index (DXY)",
          "AMEX:UUP",
          "DXY Proxy (UUP)"
        );
      }

      // Indices after (use reliable proxies to avoid “TradingView only”)
      add("g_spy", "AMEX:SPY",   "S&P 500 (SPY)");
      add("g_qqq", "NASDAQ:QQQ", "NASDAQ 100 (QQQ)");
      add("g_ewu", "AMEX:EWU",   "UK (FTSE proxy) EWU");      // avoids FTSE index block
      add("g_ewj", "AMEX:EWJ",   "Japan (Nikkei proxy) EWJ");
      add("g_ewg", "AMEX:EWG",   "Germany (DAX proxy) EWG");
      add("g_fez", "AMEX:FEZ",   "Euro STOXX 50 proxy (FEZ)");
      return;
    }

    if(mode === "crypto"){
      $("modeTitle").textContent = "Crypto";
      $("modePill").textContent = "Digital";

      add("c_btc",   "COINBASE:BTCUSD", "Bitcoin (BTCUSD)");
      add("c_eth",   "COINBASE:ETHUSD", "Ethereum (ETHUSD)");
      add("c_total", "CRYPTOCAP:TOTAL", "Crypto Total Cap");
      add("c_dom",   "CRYPTOCAP:BTC.D", "BTC Dominance");
      return;
    }
  }

  // Rebuild all charts when timeframe changes
  function applyRange(newRange){
    currentRange = newRange;

    // Rebuild BTC chart and current section charts
    loadBTCChart();
    setMode(currentMode);
  }

  // Side panel
  document.querySelectorAll(".modeBtn").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      document.querySelectorAll(".modeBtn").forEach(b=>b.classList.remove("active"));
      btn.classList.add("active");
      setMode(btn.dataset.mode);
    });
  });

  // Timeframe buttons
  document.querySelectorAll(".rangeBtn").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      document.querySelectorAll(".rangeBtn").forEach(b=>b.classList.remove("active"));
      btn.classList.add("active");
      applyRange(btn.dataset.range);
    });
  });

  // ---------- Notes ----------
  const noteArea = $("noteArea");
  const noteStorageKey = "macroWarRoom.note";

  const savedNote = localStorage.getItem(noteStorageKey);
  if(savedNote) noteArea.value = savedNote;

  noteArea.addEventListener("input", () => {
    localStorage.setItem(noteStorageKey, noteArea.value);
  });

  $("btnNoteNew").addEventListener("click", () => {
    const stamp = new Date().toLocaleString();
    const prefix = noteArea.value.trim() ? "\n\n" : "";
    noteArea.value += `${prefix}--- New note (${stamp}) ---\n`;
    noteArea.focus();
    localStorage.setItem(noteStorageKey, noteArea.value);
  });

  $("btnNoteClear").addEventListener("click", () => {
    noteArea.value = "";
    localStorage.removeItem(noteStorageKey);
    noteArea.focus();
  });

  $("btnNoteSave").addEventListener("click", () => {
    const stamp = new Date().toISOString().replace(/[:.]/g, "-");
    const fileName = `macro-war-room-note-${stamp}.txt`;
    const content = noteArea.value || "";

    const blob = new Blob([content], { type: "text/plain;charset=utf-8" });
    const href = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = href;
    a.download = fileName;
    document.body.appendChild(a);
    a.click();
    a.remove();

    URL.revokeObjectURL(href);
  });

  // ---------- Controls ----------
  $("btnRefresh").addEventListener("click", refreshAll);

  // Auto refresh
  let timer = null;
  function setAutoRefresh(seconds){
    if(timer) clearInterval(timer);
    timer = null;
    if(seconds > 0){
      timer = setInterval(refreshAll, seconds * 1000);
    }
  }
  $("refreshEvery").addEventListener("change", (e) => {
    setAutoRefresh(parseInt(e.target.value, 10));
  });

  // Music toggle
  const music = $("bgMusic");
  const btnMusic = $("btnMusic");
  let musicOn = false;

  btnMusic.addEventListener("click", async () => {
    try{
      if(!musicOn){
        await music.play();
        musicOn = true;
        btnMusic.textContent = "Pause music";
      } else {
        music.pause();
        musicOn = false;
        btnMusic.textContent = "Play music";
      }
    } catch(e){
      alert("Music couldn't start. Make sure assets/music.mp3 exists, then click again.");
    }
  });

  // ---------- Boot ----------
  loadTicker();
  loadBTCChart();
  setMode("devil");
  refreshAll();
  setAutoRefresh(parseInt($("refreshEvery").value, 10));
</script>

</body>
</html>
