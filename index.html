<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Br's Macro War Room</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#05080f;
  --panel:#0d1422;
  --text:#e6edf3;
  --muted:#7f8ea3;
  --good:#19c37d;
  --bad:#ff4d4f;
  --accent:#19c37d;
  --radius:16px;
}

*{box-sizing:border-box}
body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:'Share Tech Mono', monospace;
  overflow-x:hidden;
}

/* ===== BACKGROUND VIDEO GRID ===== */
.bgWall{
  position:fixed;
  inset:0;
  z-index:-3;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  grid-auto-rows:180px;
  gap:10px;
  padding:14px;
  opacity:.20;
  pointer-events:none;
}
.bgTile{
  width:100%;
  height:100%;
  object-fit:cover;
  border-radius:16px;
  filter:blur(1px) brightness(.85);
}

/* Overlay */
body::after{
  content:"";
  position:fixed;
  inset:0;
  z-index:-2;
  background:linear-gradient(180deg,rgba(5,8,15,.85),rgba(5,8,15,.95));
}

/* ===== SIDE PANEL ===== */
.sidePanel{
  position:fixed;
  top:50%;
  left:0;
  transform:translateY(-50%);
  width:220px;
  background:rgba(8,14,24,.95);
  border-right:1px solid rgba(40,60,90,.4);
  padding:20px 12px;
  display:flex;
  flex-direction:column;
  gap:14px;
  z-index:10;
}
.panelTitle{
  font-family:'Orbitron';
  font-size:12px;
  color:var(--muted);
  text-transform:uppercase;
}
.modeBtn{
  background:rgba(20,30,50,.7);
  border:1px solid rgba(40,60,90,.6);
  padding:10px;
  border-radius:10px;
  color:var(--text);
  cursor:pointer;
  font-family:'Share Tech Mono';
  transition:.2s;
}
.modeBtn:hover{background:rgba(30,50,80,.9)}
.modeBtn.active{
  border-color:var(--accent);
  box-shadow:0 0 12px rgba(25,195,125,.4);
}

/* ===== MAIN LAYOUT ===== */
.wrap{
  margin-left:240px;
  padding:20px;
  max-width:1700px;
}

h1{
  font-family:'Orbitron';
  letter-spacing:2px;
  text-transform:uppercase;
}

.card{
  background:var(--panel);
  border:1px solid rgba(40,60,90,.5);
  border-radius:var(--radius);
  padding:14px;
  margin-bottom:20px;
}

.btcPrice{
  font-size:42px;
  font-family:'Orbitron';
}

.miniStats{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:10px;
  margin-top:10px;
}

.statBox{
  background:rgba(255,255,255,.03);
  padding:10px;
  border-radius:10px;
  border:1px solid rgba(40,60,90,.4);
}

.marketsGrid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:14px;
}

.embedCard{
  padding:0;
}

.controls{
  display:flex;
  gap:10px;
  margin-top:10px;
}

button{
  background:rgba(20,30,50,.7);
  border:1px solid rgba(40,60,90,.6);
  color:var(--text);
  padding:8px 12px;
  border-radius:10px;
  cursor:pointer;
}
button:hover{background:rgba(30,50,80,.9)}

</style>
</head>

<body>

<div class="bgWall">
  <video class="bgTile" autoplay muted loop playsinline><source src="assets/bg.mp4" type="video/mp4"></video>
  <video class="bgTile" autoplay muted loop playsinline><source src="assets/bg.mp4" type="video/mp4"></video>
  <video class="bgTile" autoplay muted loop playsinline><source src="assets/bg.mp4" type="video/mp4"></video>
  <video class="bgTile" autoplay muted loop playsinline><source src="assets/bg.mp4" type="video/mp4"></video>
  <video class="bgTile" autoplay muted loop playsinline><source src="assets/bg.mp4" type="video/mp4"></video>
  <video class="bgTile" autoplay muted loop playsinline><source src="assets/bg.mp4" type="video/mp4"></video>
</div>

<div class="sidePanel">
  <div class="panelTitle">Market View</div>
  <button class="modeBtn active" data-mode="devil">Devil's Chess Board</button>
  <button class="modeBtn" data-mode="indices">Global Indices</button>
  <button class="modeBtn" data-mode="crypto">Crypto</button>
</div>

<div class="wrap">

<h1>Macro War Room</h1>

<div class="card">
  <div id="tv_btc_top"></div>

  <div class="btcPrice" id="btcPrice">$--</div>
  <div id="btcChange"></div>

  <div class="miniStats">
    <div class="statBox">24h High: <span id="btcHigh">-</span></div>
    <div class="statBox">24h Low: <span id="btcLow">-</span></div>
    <div class="statBox">24h Volume: <span id="btcVol">-</span></div>
    <div class="statBox">Sats per $1: <span id="satsPerUsd">-</span></div>
  </div>
</div>

<div class="card">
  <div class="marketsGrid" id="marketsGrid"></div>
</div>

<div class="controls">
  <button id="refreshBtn">Refresh</button>
  <button id="musicBtn">Play Music</button>
</div>

</div>

<audio id="bgMusic" loop>
  <source src="assets/music.mp3" type="audio/mpeg">
</audio>

<script>
const $ = id => document.getElementById(id);

async function fetchBTC(){
  const ticker = await fetch("https://api.exchange.coinbase.com/products/BTC-USD/ticker").then(r=>r.json());
  const stats  = await fetch("https://api.exchange.coinbase.com/products/BTC-USD/stats").then(r=>r.json());

  const price = Number(ticker.price);
  const open = Number(stats.open);

  $("btcPrice").innerText = "$"+price.toLocaleString();
  const pct = ((price-open)/open)*100;
  $("btcChange").innerText = "24h: "+pct.toFixed(2)+"%";

  $("btcHigh").innerText = "$"+Number(stats.high).toLocaleString();
  $("btcLow").innerText = "$"+Number(stats.low).toLocaleString();
  $("btcVol").innerText = Number(stats.volume).toLocaleString();
  $("satsPerUsd").innerText = Math.floor(100000000/price).toLocaleString()+" sats";
}

function miniSymbol(container, symbol, title){
  const div=document.createElement("div");
  div.className="embedCard";
  div.innerHTML=`<div id="${container}"></div>`;
  $("marketsGrid").appendChild(div);

  const s=document.createElement("script");
  s.src="https://s3.tradingview.com/external-embedding/embed-widget-mini-symbol-overview.js";
  s.async=true;
  s.innerHTML=JSON.stringify({
    symbol,
    width:"100%",
    height:260,
    locale:"en",
    dateRange:"12M",
    colorTheme:"dark",
    isTransparent:true
  });
  div.firstChild.appendChild(s);
}

function loadMode(mode){
  $("marketsGrid").innerHTML="";
  if(mode==="devil"){
    miniSymbol("pltr","NYSE:PLTR");
    miniSymbol("rtx","NYSE:RTX");
    miniSymbol("lmt","NYSE:LMT");
    miniSymbol("noc","NYSE:NOC");
    miniSymbol("amd","NASDAQ:AMD");
    miniSymbol("gd","NYSE:GD");
  }
  if(mode==="indices"){
    miniSymbol("qqq","NASDAQ:QQQ");
    miniSymbol("spy","AMEX:SPY");
    miniSymbol("ftse","FTSE:UKX");
    miniSymbol("nikkei","INDEX:NKY");
    miniSymbol("stoxx","INDEX:SX5E");
    miniSymbol("dax","XETR:DAX");
  }
  if(mode==="crypto"){
    miniSymbol("btc","COINBASE:BTCUSD");
    miniSymbol("eth","COINBASE:ETHUSD");
    miniSymbol("total","CRYPTOCAP:TOTAL");
    miniSymbol("dom","CRYPTOCAP:BTC.D");
  }
}

document.querySelectorAll(".modeBtn").forEach(btn=>{
  btn.onclick=()=>{
    document.querySelectorAll(".modeBtn").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    loadMode(btn.dataset.mode);
  };
});

$("refreshBtn").onclick=fetchBTC;

const music=$("bgMusic");
let playing=false;
$("musicBtn").onclick=()=>{
  if(!playing){music.play();playing=true;$("musicBtn").innerText="Pause Music";}
  else{music.pause();playing=false;$("musicBtn").innerText="Play Music";}
};

const btcScript=document.createElement("script");
btcScript.src="https://s3.tradingview.com/external-embedding/embed-widget-symbol-overview.js";
btcScript.async=true;
btcScript.innerHTML=JSON.stringify({
  symbols:[["BTCUSD","COINBASE:BTCUSD"]],
  width:"100%",
  height:400,
  locale:"en",
  colorTheme:"dark",
  autosize:true,
  showVolume:true,
  chartType:"area",
  isTransparent:true
});
document.getElementById("tv_btc_top").appendChild(btcScript);

fetchBTC();
loadMode("devil");
</script>

</body>
</html>
