<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Intel Page • Decommissioned</title>
<link rel="icon" href="./assets/favicon.ico" sizes="any">
<style>
:root{
  --bg:#090909;
  --text:#f1eee8;
  --muted:#8f897d;
  --accent:#d1a24a;
  --border: rgba(209, 162, 74, .35);
  --terminal: 'Roboto Mono', ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
}
*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0;
  display:grid;
  place-items:center;
  background:var(--bg);
  color:var(--text);
  font-family:var(--terminal);
}
body::before{
  content:"";
  position:fixed;
  inset:0;
  z-index:-1;
  background:rgba(0,0,0,.3);
}
.panel{
  width:min(720px,92vw);
  border:1px solid var(--border);
  padding:20px;
  background:rgba(12,12,12,.92);
}
.k{color:var(--muted);font-size:12px;letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px;}
h1{font-size:24px;margin:0 0 8px 0;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);}
p{margin:0 0 12px 0;color:var(--muted);}
a{color:var(--text);text-decoration:none;border:1px solid var(--border);padding:8px 12px;display:inline-block;text-transform:uppercase;letter-spacing:.07em;}
</style>
</head>
<body>
  <main class="panel">
    <div class="k">System Notice</div>
    <h1>Intel Page Decommissioned</h1>
    <p>This module has been retired. Return to the main dashboard.</p>
    <a href="index.html">Return to Dashboard</a>
  </main>
</body>
</html>
